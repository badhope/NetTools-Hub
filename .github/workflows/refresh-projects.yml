name: refresh-projects

# ============================================================================
# NetTools Hub — auto-refresh of data/projects.json
# ============================================================================
#
# Triggers:
#   - schedule        : every Sunday 03:00 UTC (well off-peak, just before
#                       the deploy-at-push workflow rebuilds Pages on Monday)
#   - workflow_dispatch: manual "Run workflow" button, useful for backfills
#                        after a mass addition
#   - push to main    : if a contributor edits data/projects.json by hand,
#                       a refresh fires within 5 minutes to clean up
#                       stars/dates on the new entries. Suppressed when
#                       the path is data/projects.json AND the actor is
#                       `github-actions[bot]` (this avoids the self-loop
#                       where the bot's own commit re-triggers the bot).
#
# Behaviour:
#   - runs `node scripts/refresh-projects.mjs` with the repo's
#     built-in GITHUB_TOKEN (5000 req/h, plenty for 200+ repos);
#   - if the file is dirty, commits & pushes back to the same branch;
#   - if the file is clean, exits 0 silently.
#
# The workflow uses `git diff --exit-code` after the script runs to
# detect a clean run; that is more robust than parsing the script's
# stdout because a future refactor of the script (e.g. adding a
# new line to the data file) will not silently break CI.
# ============================================================================

on:
  schedule:
    # Sundays 03:00 UTC. Spread out from `deploy.yml` so a stalled
    # refresh cannot delay a deploy, and vice-versa.
    - cron: '0 3 * * 0'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'data/projects.json'
      - 'scripts/refresh-projects.mjs'
    # Don't loop: when this very workflow pushes a refresh commit,
    # the actor is github-actions[bot], and we should not trigger
    # another refresh immediately. Five minutes of cooldown is
    # plenty because the only thing that would actually need
    # cleaning up is the file we just wrote.
    branches-ignore: []
  # `concurrency` (below) also serialises refresh runs, but the
  # explicit actor guard is cheap insurance against a bot account
  # misconfiguration.

concurrency:
  # One refresh at a time per branch. A scheduled run that
  # overlaps a manual trigger will wait for the first to finish.
  group: refresh-projects-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # need to push the refreshed data file back

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history is not required for the script, but shallow
          # fetches break `git log` based post-conditions if we ever
          # add them; the repo is small, the cost is negligible.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install pnpm
        run: corepack enable

      - name: Run refresh
        id: refresh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          node scripts/refresh-projects.mjs
          # The script always writes the file even on partial failure
          # (it bakes lastUpdated in). Use `git diff --quiet` to decide
          # whether anything material actually changed.
          if git diff --quiet -- data/projects.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No material changes to data/projects.json."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Material changes detected — see diff below."
            git --no-pager diff --stat -- data/projects.json
          fi

      - name: Commit & push
        if: steps.refresh.outputs.changed == 'true' && github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config email "github-actions[bot]@users.noreply.github.com"
          git add data/projects.json
          # The commit message includes a summary of how many entries
          # moved status, so a casual `git log` reader can see what
          # the bot did without `git show`-ing the diff.
          STATUS_MOVES=$(git --no-pager diff --cached --numstat | wc -l)
          git commit -m "chore(data): refresh project metadata via GitHub API

          Auto-generated by the refresh-projects workflow.
          ${STATUS_MOVES} entries touched (stars / forks / license / lastCommit / status)."
          git push
