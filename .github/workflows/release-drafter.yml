name: Release Drafter

# Drafts the next GitHub Release on every push to `main` and on every opened /
# reopened / re-opened PR. The actual GitHub Release is created only when a
# maintainer hits "Publish" in the Drafts tab.
# https://github.com/release-drafter/release-drafter#configuration

on:
  push:
    branches: ["main"]
  pull_request_target:
    types: [opened, reopened, synchronize, edited]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  update_release_draft:
    runs-on: ubuntu-latest
    steps:
      - name: Draft the next release notes
        uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
