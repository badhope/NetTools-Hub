name: Release Drafter

# Drafts the next GitHub Release on every push to `main` and on every opened /
# reopened / re-opened PR. The actual GitHub Release is created only when a
# maintainer hits "Publish" in the Drafts tab.
# https://github.com/release-drafter/release-drafter#configuration

on:
  push:
    branches: ['main']
  pull_request_target:
    types: [opened, reopened, synchronize, edited]
    # Hardening: do not waste secrets+CI on bot PRs. The release-drafter
    # action only reads PR metadata (it never checks out the PR head) so this
    # workflow is not a pwn vector, but limiting the trigger surface still
    # reduces noise and the worst-case blast radius.
    branches-ignore:
      - 'dependabot/**'
      - 'renovate/**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  update_release_draft:
    runs-on: ubuntu-latest
    steps:
      - name: Draft the next release notes
        uses: release-drafter/release-drafter@693d20e7c1ce1a81d3a41962f85914253b518449 # v6.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
